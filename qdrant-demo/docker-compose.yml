services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: sandbox-qdrant
    ports:
      - "6333:6333"   # REST / Web UI: http://localhost:6333/dashboard
      - "6334:6334"   # gRPC
    volumes:
      - ./qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
