<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Qdrant Demo{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
           background: #f4f6f9; color: #2c3e50; min-height: 100vh; }

    /* ── 顶部导航 ── */
    nav { background: #1a1a2e; padding: 0 20px; display: flex; align-items: center; height: 48px; gap: 4px; }
    .nav-brand { color: #818cf8; font-weight: 700; font-size: 15px; margin-right: 16px; white-space: nowrap; }
    .nav-link { color: #94a3b8; text-decoration: none; font-size: 13px; padding: 6px 12px;
                border-radius: 5px; transition: background .15s, color .15s; }
    .nav-link:hover { color: #e2e8f0; background: rgba(255,255,255,.06); }
    .nav-link.active { color: #c7d2fe; background: rgba(129,140,248,.15); }
    .nav-docs { margin-left: auto; }

    /* ── 主内容区 ── */
    .container { max-width: 780px; margin: 0 auto; padding: 32px 16px; }
    h1 { font-size: 20px; font-weight: 600; color: #1e293b; margin-bottom: 20px;
         display: flex; align-items: center; justify-content: space-between; }
    .docs-link { font-size: 12px; font-weight: 400; color: #818cf8; text-decoration: none; }
    .docs-link:hover { text-decoration: underline; }

    /* ── 卡片 ── */
    .card { background: #fff; border-radius: 10px; padding: 20px 24px;
            margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04); }

    /* ── 表单元素 ── */
    label { display: block; font-size: 13px; color: #64748b; margin-bottom: 6px; font-weight: 500; }
    input[type=text], input[type=number], textarea, select {
      width: 100%; border: 1px solid #e2e8f0; border-radius: 7px;
      padding: 9px 12px; font-size: 15px; font-family: inherit;
      outline: none; transition: border-color .15s, box-shadow .15s; color: #1e293b; background: #fff;
    }
    input[type=text]:focus, textarea:focus, input[type=number]:focus {
      border-color: #818cf8; box-shadow: 0 0 0 3px rgba(129,140,248,.15);
    }
    textarea { resize: vertical; line-height: 1.6; }
    .form-row { display: flex; gap: 10px; align-items: flex-end; }
    .form-row .flex1 { flex: 1; }
    .hint { font-size: 12px; color: #94a3b8; margin-top: 6px; line-height: 1.5; }

    /* ── 按钮 ── */
    .btn { display: inline-flex; align-items: center; gap: 6px; background: #6366f1; color: #fff;
           border: none; border-radius: 7px; padding: 9px 20px; font-size: 14px;
           font-weight: 500; cursor: pointer; transition: background .15s; white-space: nowrap; }
    .btn:hover { background: #4f46e5; }
    .btn-sm { padding: 6px 14px; font-size: 13px; }
    .btn-outline { background: transparent; color: #6366f1; border: 1px solid #c7d2fe; }
    .btn-outline:hover { background: #eef2ff; border-color: #6366f1; }
    .btn-danger { background: #ef4444; }
    .btn-danger:hover { background: #dc2626; }

    /* ── 分类过滤 select ── */
    .form-row select { width: auto; min-width: 130px; }

    /* ── 提示条 ── */
    .alert { border-radius: 7px; padding: 11px 16px; margin-bottom: 16px; font-size: 13px; line-height: 1.5; }
    .alert-success { background: #f0fdf4; color: #15803d; border-left: 3px solid #22c55e; }
    .alert-error   { background: #fef2f2; color: #b91c1c; border-left: 3px solid #ef4444; }
    .alert code { background: rgba(0,0,0,.06); padding: 1px 5px; border-radius: 3px; font-size: 12px; }

    /* ── 搜索结果 ── */
    .result-list { margin-top: 4px; }
    .result-item { padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
    .result-item:last-child { border-bottom: none; }
    .result-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .score-badge { display: inline-flex; align-items: center;
                   background: #eef2ff; color: #4f46e5;
                   border-radius: 5px; padding: 2px 8px; font-size: 12px; font-weight: 600; }
    .id-badge { background: #f1f5f9; color: #94a3b8; border-radius: 4px;
                padding: 2px 7px; font-size: 11px; }
    .result-text { font-size: 15px; color: #1e293b; line-height: 1.6; }
    .no-result { color: #94a3b8; font-size: 14px; padding: 8px 0; }

    /* ── 说明信息 ── */
    .info-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;
                padding: 16px 20px; font-size: 13px; color: #475569; line-height: 1.8; }
    .info-box strong { color: #334155; }
    .info-box ol, .info-box ul { margin-left: 18px; margin-top: 4px; }
    code { background: #f1f5f9; color: #6366f1; padding: 1px 6px; border-radius: 4px; font-size: 12px; }

    /* ── 数量选择 ── */
    input[type=number] { width: 72px; }
  </style>
</head>
<body>
<nav>
  <span class="nav-brand">Qdrant Demo</span>
  <a href="/" class="nav-link {% if active == 'search' %}active{% endif %}">搜索</a>
  <a href="/ingest" class="nav-link {% if active == 'ingest' %}active{% endif %}">写入数据</a>
  <a href="/docs" target="_blank" class="nav-link nav-docs">API 文档 ↗</a>
</nav>
<div class="container">
  {% block content %}{% endblock %}
</div>
</body>
</html>
